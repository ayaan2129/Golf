<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Junior Golf Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Junior Golf Tracker</h1>

    <div class="summary">
      <h2>Round Summary</h2>
      <p id="sumScore">Total Score: 0</p>
      <p id="sumDiff">Score vs Par: 0</p>
      <p id="sumPutts">Total Putts: 0</p>
      <p id="sumFairway">Fairway Hit %: 0%</p>
      <p id="sumPenalties">Penalties: 0</p>
      <p id="sumMissed">Missed Short Putts: 0</p>
      <button id="resetBtn">New Round</button>
    </div>

    <div id="holes"></div>

    <div class="coach">
      <h2>Coach Analysis</h2>

      <h3>Top Weakness</h3>
      <p id="topWeakness">Fill in some holes to get your coach feedback.</p>

      <h3>Biggest Mistakes</h3>
      <ul id="mistakesList"></ul>

      <h3>What to Practise</h3>
      <ul id="practiceList"></ul>

      <h3>Your Strengths</h3>
      <ul id="strengthsList"></ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
